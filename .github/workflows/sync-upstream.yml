name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should-sync: ${{ steps.check.outputs.should-sync }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: engels74/base-image
          path: repo

      - name: Check for hotio/mrhotio commits in alpinevpn/jammyvpn
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Added authentication
        run: |
          cd repo
          git config --global --add safe.directory /github/workspace/repo

          echo "=== Initializing Repository State ==="
          echo "Current working directory: $(pwd)"
          echo "Initial commit: $(git log -1 --oneline)"

          echo "=== Remote Configuration ==="
          echo "Adding upstream remote..."
          git remote add upstream https://github.com/hotio/base.git || true
          echo "Current remotes:"
          git remote -v

          echo "=== Fetching Upstream Changes ==="
          git fetch upstream alpinevpn jammyvpn
          echo "Fetched branches:"
          git branch -r | grep upstream/

          echo "=== AlpineVPN Worktree Setup ==="
          git worktree add ../alpinevpn alpinevpn
          cd ../alpinevpn
          echo "Worktree directory: $(pwd)"
          echo "Current branch: $(git branch --show-current)"
          echo "Branch status:"
          git status -sb

          echo "---- AlpineVPN Comparison ----"
          UPSTREAM_ALPINE_SHA=$(git rev-parse upstream/alpinevpn)
          LOCAL_ALPINE_SHA=$(git rev-parse HEAD)
          echo "Upstream SHA (alpinevpn): $UPSTREAM_ALPINE_SHA"
          echo "Local SHA (alpinevpn):    $LOCAL_ALPINE_SHA"
          echo "Commit delta: $(git rev-list --count HEAD..upstream/alpinevpn) commits behind"

          if [ "$UPSTREAM_ALPINE_SHA" != "$LOCAL_ALPINE_SHA" ]; then
            echo "New alpinevpn commits:"
            git log --oneline --graph --decorate $LOCAL_ALPINE_SHA..upstream/alpinevpn
            COMMITS_ALPINE=$(git rev-list $LOCAL_ALPINE_SHA..upstream/alpinevpn)
            echo "Found ${#COMMITS_ALPINE[@]} new commits in alpinevpn"
          else
            COMMITS_ALPINE=()
            echo "No new commits in alpinevpn branch"
          fi

          echo "=== JammyVPN Worktree Setup ==="
          git worktree add ../jammyvpn jammyvpn
          cd ../jammyvpn
          echo "Worktree directory: $(pwd)"
          echo "Current branch: $(git branch --show-current)"
          echo "Branch status:"
          git status -sb

          echo "---- JammyVPN Comparison ----"
          UPSTREAM_JAMMY_SHA=$(git rev-parse upstream/jammyvpn)
          LOCAL_JAMMY_SHA=$(git rev-parse HEAD)
          echo "Upstream SHA (jammyvpn): $UPSTREAM_JAMMY_SHA"
          echo "Local SHA (jammyvpn):    $LOCAL_JAMMY_SHA"
          echo "Commit delta: $(git rev-list --count HEAD..upstream/jammyvpn) commits behind"

          if [ "$UPSTREAM_JAMMY_SHA" != "$LOCAL_JAMMY_SHA" ]; then
            echo "New jammyvpn commits:"
            git log --oneline --graph --decorate $LOCAL_JAMMY_SHA..upstream/jammyvpn
            COMMITS_JAMMY=$(git rev-list $LOCAL_JAMMY_SHA..upstream/jammyvpn)
            echo "Found ${#COMMITS_JAMMY[@]} new commits in jammyvpn"
          else
            COMMITS_JAMMY=()
            echo "No new commits in jammyvpn branch"
          fi

          echo "=== Commit Author Analysis ==="
          # Handle empty commits using array syntax
          COMMITS_LIST=("${COMMITS_ALPINE[@]}" "${COMMITS_JAMMY[@]}")
          TOTAL_COMMITS=${#COMMITS_LIST[@]}
          echo "Total commits to analyze: $TOTAL_COMMITS"
          FOUND=false
          COUNT=0

          for SHA in "${COMMITS_LIST[@]}"; do
            COUNT=$((COUNT+1))
            echo "--- Analyzing commit $COUNT/$TOTAL_COMMITS ($SHA) ---"
            # Add error handling for API calls
            AUTHOR=$(gh api /repos/hotio/base/commits/$SHA --jq '.author.login' 2>/dev/null || echo "unknown")
            COMMIT_MESSAGE=$(git show -s --format=%s $SHA 2>/dev/null || echo "could not retrieve message")
            echo "Author: $AUTHOR | Message: $COMMIT_MESSAGE"
            
            if [[ "$AUTHOR" == "hotio" || "$AUTHOR" == "mrhotio" ]]; then
              echo "✅ MATCH FOUND - Author: $AUTHOR"
              FOUND=true
              break
            else
              echo "❌ Non-matching author: $AUTHOR"
            fi
          done

          echo "=== Final Decision ==="
          if $FOUND; then
            echo "🔄 SYNC REQUIRED: Found commits from hotio/mrhotio"
            echo "should-sync=true" >> $GITHUB_OUTPUT
          else
            echo "✅ NO SYNC NEEDED: No relevant commits found"
            echo "should-sync=false" >> $GITHUB_OUTPUT
          fi

  sync:
    needs: check-upstream
    if: needs.check-upstream.outputs.should-sync == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: [master, alpinevpn, jammyvpn]
    steps:
      - name: Checkout patches branch
        if: matrix.branch != 'master'
        uses: actions/checkout@v4
        with:
          ref: patches
          path: patches
          fetch-depth: 0

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          path: target
          fetch-depth: 0

      - name: Sync and Apply
        run: |
          cd target
          echo "=== SYNC PROCESS STARTING FOR ${{ matrix.branch }} ==="
          echo "Initial HEAD: $(git rev-parse HEAD)"
          echo "Branch status before sync:"
          git status -sb

          echo "--- Configuring Git Environment ---"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "--- Fetching Upstream Changes ---"
          git remote add upstream https://github.com/hotio/base.git
          git fetch --verbose upstream
          UPSTREAM_SHA=$(git rev-parse upstream/${{ matrix.branch }})
          echo "Upstream HEAD: $UPSTREAM_SHA"

          echo "--- Resetting Branch ---"
          echo "Resetting from $(git rev-parse HEAD) to $UPSTREAM_SHA"
          git reset --hard $UPSTREAM_SHA
          echo "New HEAD: $(git rev-parse HEAD)"
          echo "Branch status after reset:"
          git status -sb

          if [[ "${{ matrix.branch }}" != "master" ]]; then
            echo "--- Patch Application Process ---"
            echo "Copying patches from ../../patches/patches/${{ matrix.branch }}"
            cp -v ../../patches/patches/${{ matrix.branch }}/*.patch . || echo "No patches found"
            
            # Safer patch application with validation
            for PATCH in *.patch; do
              [ -f "$PATCH" ] || continue  # Skip if no patches
              echo "🚀 Validating $PATCH"
              git apply --check -v "$PATCH" 2>&1 | sed 's/^/    /'
              echo "✅ Validation passed, applying patch"
              git apply -v -w "$PATCH" 2>&1 | sed 's/^/    /'
              echo "✅ Patch applied successfully"
            done

            echo "Post-patch file status:"
            git status -sb
          fi

          echo "--- Finalizing Changes ---"
          git add .
          if ! git diff --quiet HEAD; then
            echo "Changes detected:"
            git diff --stat
            git commit -m "Auto-sync: Applied patches ($(date +%Y-%m-%d)) [skip ci]"
            echo "Commit created: $(git log -1 --oneline)"
            echo "--- Pushing Changes ---"
            git push origin ${{ matrix.branch }} --force
            echo "✅ Push completed successfully"
          else
            echo "💤 No changes detected - nothing to commit"
          fi

          echo "=== FINAL BRANCH STATUS ==="
          git log -1 --pretty="%h %s [%an]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
