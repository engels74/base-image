name: sync-upstream

on:
  schedule:
    - cron: '0 2 * * *'  # Runs daily at 2am
  workflow_dispatch:  

jobs:
  check-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          ref: alpinevpn

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/hotio/base.git
          git fetch upstream alpinevpn || { echo "Failed to fetch upstream"; exit 1; }
          git checkout -b upstream-alpinevpn --track upstream/alpinevpn || { echo "Failed to checkout upstream branch"; exit 1; }

      - name: Check commit author
        id: check_author
        run: |
          AUTHOR=$(git log -1 --pretty=format:'%an')
          echo "Last commit author: $AUTHOR"
          if [[ "$AUTHOR" == "mrhotio" || "$AUTHOR" == "hotio" ]]; then
            echo "Valid author detected."
            echo "author_valid=true" >> $GITHUB_OUTPUT
          else
            echo "Invalid author. Exiting."
            echo "author_valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Create squash commit and PR
        if: steps.check_author.outputs.author_valid == 'true'
        run: |
          git checkout alpinevpn  # Switch back to your fork's branch
          git merge --squash upstream/alpinevpn || { echo "Squash merge failed"; exit 1; }
          git push origin alpinevpn || { echo "Push failed"; exit 1; }

      - name: Create Pull Request
        if: steps.check_author.outputs.author_valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base alpinevpn \
            --head upstream-alpinevpn \
            --title "Update from upstream alpinevpn branch" \
            --body "Automated pull request to update the alpinevpn branch from upstream.

          Commit Author: $(git log -1 --pretty=format:'%an')
          Commit Message: $(git log -1 --pretty=format:'%s')

          This pull request was automatically generated by the sync workflow and includes the latest updates from the upstream repository hotio/base 'alpinevpn' branch."
